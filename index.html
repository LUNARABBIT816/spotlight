<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스포트라이트 챌린지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body {
            font-family: 'Jua', sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            width: 100vw;
        }

        #app {
            width: 100%;
            height: 100vh;
            background-color: #1e293b;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .camera-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .mirror-flip {
            transform: scaleX(-1);
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-large {
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        .btn-large:active { transform: scale(0.95); }
        
        #countdown-overlay { 
            text-shadow: 0 0 60px rgba(239, 68, 68, 0.9);
            font-size: clamp(10rem, 35vw, 25rem);
            z-index: 30;
        }

        .ui-panel {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 50;
            display: flex;
            gap: 1rem;
        }

        .ui-btn {
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .photo-card {
            background: #334155;
            padding: 10px;
            border-radius: 1.5rem;
            border: 3px solid #475569;
        }

        .custom-scroll::-webkit-scrollbar { width: 12px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        /* 셔터 플래시 효과 */
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }
        .flash-active {
            animation: flash-anim 0.5s ease-out;
        }
        @keyframes flash-anim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="app">
        <!-- 1. 시작 화면 -->
        <div id="step-start" class="flex-1 flex flex-col items-center justify-center p-10 text-center space-y-10 z-10 bg-slate-900">
            <div class="space-y-4">
                <div class="text-[10rem] md:text-[12rem] leading-none animate-bounce">📸</div>
                <h1 class="text-7xl md:text-[10rem] font-extrabold text-red-500 tracking-tighter uppercase leading-tight">Spotlight</h1>
                <h2 class="text-3xl md:text-5xl text-slate-300">최후의 5초, 주인공이 되어보세요!</h2>
            </div>
            
            <div class="flex flex-col md:flex-row gap-8 justify-center pt-6 w-full max-w-4xl px-4">
                <button id="btn-start" class="btn-large flex-1 bg-red-500 hover:bg-red-600 text-white text-4xl md:text-5xl py-8 rounded-[2.5rem] shadow-2xl font-bold border-b-8 border-red-800">
                    챌린지 시작
                </button>
                <button id="btn-gallery" class="btn-large flex-1 bg-blue-600 hover:bg-blue-700 text-white text-4xl md:text-5xl py-8 rounded-[2.5rem] shadow-2xl font-bold border-b-8 border-blue-800">
                    전시관 보기
                </button>
            </div>
            
            <button onclick="toggleFullscreen()" class="bg-slate-700 hover:bg-slate-600 text-white text-xl px-12 py-4 rounded-full border-2 border-slate-500 transition-all shadow-lg">
                🖥️ 전체 화면으로 즐기기
            </button>
        </div>

        <!-- 2. 게임 화면 -->
        <div id="step-game" class="hidden h-full w-full">
            <div class="ui-panel">
                <button class="ui-btn" onclick="exitToHome()">종료 ✖</button>
            </div>
            <div class="camera-view" id="camera-container">
                <video id="video" autoplay playsinline muted class="mirror-flip"></video>
                <canvas id="gameCanvas" class="mirror-flip"></canvas>
                <div id="countdown-overlay" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <span id="countdown" class="font-black italic"></span>
                </div>
            </div>
        </div>

        <!-- 3. 결과 확인 화면 -->
        <div id="step-result" class="hidden flex-1 flex flex-col items-center justify-center p-8 text-center space-y-6 z-10 bg-slate-900">
            <div class="space-y-2">
                <h2 class="text-4xl md:text-5xl font-bold text-yellow-400">나이스 샷! ✨</h2>
                <p class="text-xl text-slate-300">이 사진을 전시관에 등록할까요?</p>
            </div>
            <div class="relative inline-block border-[12px] border-white rounded-[2.5rem] shadow-2xl overflow-hidden bg-black max-w-[85%] max-h-[60vh]">
                <canvas id="resultCanvas" class="w-full h-full object-contain"></canvas>
            </div>
            <div class="flex gap-8 justify-center pt-2 w-full max-w-3xl">
                <button onclick="startCamera()" class="flex-1 bg-slate-600 hover:bg-slate-500 text-white py-6 rounded-2xl text-2xl md:text-3xl font-bold btn-large">다시 찍기</button>
                <button id="saveBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-6 rounded-2xl text-2xl md:text-3xl font-bold shadow-xl border-b-8 border-green-900">전시관 등록</button>
            </div>
        </div>

        <!-- 4. 전시관 화면 -->
        <div id="step-gallery" class="hidden h-full flex flex-col p-8 space-y-6 z-10 bg-slate-900">
            <div class="flex justify-between items-center border-b-6 border-slate-700 pb-6">
                <h2 class="text-5xl font-bold text-blue-400">🖼️ 실시간 전시관</h2>
                <div class="flex gap-4">
                    <button onclick="clearPhotos()" class="bg-slate-700 px-6 py-2 rounded-xl text-lg text-red-400 font-bold hover:bg-slate-600">기록 초기화</button>
                    <button onclick="exitToHome()" class="bg-red-500 hover:bg-red-600 text-white text-2xl px-10 py-3 rounded-xl font-bold btn-large shadow-lg">메인으로</button>
                </div>
            </div>
            <div id="gallery-grid" class="flex-1 grid grid-cols-2 lg:grid-cols-3 gap-8 overflow-y-auto p-4 custom-scroll">
                <!-- 사진 데이터 -->
            </div>
            <div class="text-center pb-6">
                <button onclick="startCamera()" class="bg-red-500 text-white px-16 py-6 rounded-full text-4xl font-bold shadow-2xl btn-large border-b-8 border-red-900">새 사진 찍기</button>
            </div>
        </div>
    </div>

    <script>
        // --- 사운드 엔진 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'tick') { // 카운트다운 틱
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'final') { // 마지막 촬영음
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'shutter') { // 찰칵 소리 (화이트 노이즈)
                const bufferSize = audioCtx.sampleRate * 0.1;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                noise.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start();
            }
        }

        // 긴장감 있는 심장 박동 배경음
        let suspenseInterval;
        function startSuspenseMusic() {
            stopSuspenseMusic();
            suspenseInterval = setInterval(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(60, audioCtx.currentTime); // 낮은 베이스음
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }, 600); // 0.6초 간격 쿵-쿵-
        }
        function stopSuspenseMusic() {
            if (suspenseInterval) clearInterval(suspenseInterval);
        }

        // --- 앱 로직 ---
        const video = document.getElementById('video');
        const gameCanvas = document.getElementById('gameCanvas');
        const resultCanvas = document.getElementById('resultCanvas');
        const gCtx = gameCanvas.getContext('2d');
        const rCtx = resultCanvas.getContext('2d');
        
        let spotlight = { x: 0, y: 0, baseR: 150, r: 150, dx: 8, dy: 8, phase: 0 };
        let animationId;
        let countdownValue = 5;
        let isCaptured = false;

        function switchStep(stepId) {
            ['step-start', 'step-game', 'step-result', 'step-gallery'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(stepId).classList.remove('hidden');
        }

        function toggleFullscreen() {
            const doc = document.documentElement;
            if (!document.fullscreenElement) {
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        function syncCanvasSize() {
            const container = document.getElementById('camera-container');
            if (!container) return;
            gameCanvas.width = container.offsetWidth;
            gameCanvas.height = container.offsetHeight;
            if (spotlight.x === 0 || spotlight.x > gameCanvas.width) {
                spotlight.x = gameCanvas.width / 2;
                spotlight.y = gameCanvas.height / 2;
            }
            spotlight.baseR = Math.min(gameCanvas.width, gameCanvas.height) / 5;
        }

        window.addEventListener('resize', syncCanvasSize);

        function exitToHome() {
            isCaptured = true;
            stopSuspenseMusic();
            cancelAnimationFrame(animationId);
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }
            switchStep('step-start');
        }

        async function startCamera() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            toggleFullscreen();
            try {
                isCaptured = false;
                countdownValue = 5;
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false 
                });
                video.srcObject = stream;
                switchStep('step-game');
                video.onloadedmetadata = () => {
                    video.play();
                    setTimeout(syncCanvasSize, 100);
                    startGameLoop();
                    startCountdown();
                    startSuspenseMusic(); // 게임 시작 시 긴장감 음악 시작
                };
            } catch (err) {
                alert("카메라를 사용할 수 없습니다. 권한 설정을 확인해 주세요.");
            }
        }

        function startGameLoop() {
            if (isCaptured) return;
            const w = gameCanvas.width;
            const h = gameCanvas.height;

            spotlight.x += spotlight.dx; 
            spotlight.y += spotlight.dy;

            if (spotlight.x - spotlight.r < 0) { spotlight.x = spotlight.r; spotlight.dx *= -1; }
            if (spotlight.x + spotlight.r > w) { spotlight.x = w - spotlight.r; spotlight.dx *= -1; }
            if (spotlight.y - spotlight.r < 0) { spotlight.y = spotlight.r; spotlight.dy *= -1; }
            if (spotlight.y + spotlight.r > h) { spotlight.y = h - spotlight.r; spotlight.dy *= -1; }

            spotlight.phase += 0.05;
            spotlight.r = spotlight.baseR + Math.sin(spotlight.phase) * (spotlight.baseR * 0.4);

            if (Math.random() < 0.03) { 
                spotlight.dx = (Math.random() - 0.5) * 25; 
                spotlight.dy = (Math.random() - 0.5) * 25; 
            }

            gCtx.clearRect(0, 0, w, h);
            gCtx.fillStyle = "rgba(0, 0, 0, 0.95)";
            gCtx.fillRect(0, 0, w, h);
            
            gCtx.globalCompositeOperation = 'destination-out';
            gCtx.beginPath(); 
            gCtx.arc(spotlight.x, spotlight.y, spotlight.r, 0, Math.PI * 2); 
            gCtx.fill();
            
            gCtx.globalCompositeOperation = 'source-over';
            gCtx.strokeStyle = "white";
            gCtx.lineWidth = 12;
            gCtx.beginPath(); 
            gCtx.arc(spotlight.x, spotlight.y, spotlight.r, 0, Math.PI * 2); 
            gCtx.stroke();

            animationId = requestAnimationFrame(startGameLoop);
        }

        function startCountdown() {
            const cdDisplay = document.getElementById('countdown');
            cdDisplay.innerText = countdownValue;
            playSound('tick'); // 첫 소리

            const timer = setInterval(() => {
                if (isCaptured) { clearInterval(timer); return; }
                countdownValue--;
                if (countdownValue > 0) {
                    cdDisplay.innerText = countdownValue;
                    playSound('tick');
                } else { 
                    clearInterval(timer); 
                    cdDisplay.innerText = "📸"; 
                    playSound('final');
                    setTimeout(capturePhoto, 400); 
                }
            }, 1000);
        }

        function capturePhoto() {
            if (isCaptured) return;
            isCaptured = true;
            stopSuspenseMusic();
            cancelAnimationFrame(animationId);
            
            // 셔터 효과음 및 플래시
            playSound('shutter');
            const flash = document.getElementById('flash');
            flash.classList.add('flash-active');
            setTimeout(() => flash.classList.remove('flash-active'), 500);

            resultCanvas.width = video.videoWidth;
            resultCanvas.height = video.videoHeight;
            
            rCtx.save();
            rCtx.translate(resultCanvas.width, 0);
            rCtx.scale(-1, 1);
            rCtx.drawImage(video, 0, 0, resultCanvas.width, resultCanvas.height);
            rCtx.restore();
            
            const scaleX = resultCanvas.width / gameCanvas.width;
            const scaleY = resultCanvas.height / gameCanvas.height;
            const mask = document.createElement('canvas');
            mask.width = resultCanvas.width; mask.height = resultCanvas.height;
            const mCtx = mask.getContext('2d');
            mCtx.fillStyle = "rgba(0,0,0,0.95)"; 
            mCtx.fillRect(0, 0, mask.width, mask.height);
            mCtx.globalCompositeOperation = 'destination-out';
            mCtx.beginPath(); 
            const invX = gameCanvas.width - spotlight.x;
            mCtx.arc(invX * scaleX, spotlight.y * scaleY, spotlight.r * Math.max(scaleX, scaleY), 0, Math.PI * 2); 
            mCtx.fill();
            
            rCtx.drawImage(mask, 0, 0);

            // 미리보기 위해 게임 캔버스에 결과 잠시 렌더링
            gCtx.clearRect(0,0,gameCanvas.width, gameCanvas.height);
            gCtx.save();
            gCtx.translate(gameCanvas.width, 0);
            gCtx.scale(-1, 1);
            gCtx.drawImage(resultCanvas, 0, 0, gameCanvas.width, gameCanvas.height);
            gCtx.restore();

            setTimeout(() => {
                switchStep('step-result');
                document.getElementById('saveBtn').disabled = false;
                document.getElementById('saveBtn').innerText = "전시관 등록";
            }, 800);
        }

        function saveToLocalGallery() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = "저장 중...";

            const imageData = resultCanvas.toDataURL('image/jpeg', 0.5);
            try {
                let photos = JSON.parse(localStorage.getItem('my_spotlight_photos') || '[]');
                photos.unshift({ id: Date.now(), img: imageData });
                if (photos.length > 50) photos = photos.slice(0, 50);
                localStorage.setItem('my_spotlight_photos', JSON.stringify(photos));
                showGallery();
            } catch (e) {
                alert("저장 공간이 부족합니다! 오래된 사진을 삭제해 주세요.");
                btn.disabled = false;
                btn.innerText = "전시관 등록";
            }
        }

        function showGallery() {
            switchStep('step-gallery');
            const grid = document.getElementById('gallery-grid');
            const photos = JSON.parse(localStorage.getItem('my_spotlight_photos') || '[]');
            
            if (photos.length > 0) {
                grid.innerHTML = '';
                photos.forEach(p => {
                    const div = document.createElement('div');
                    div.className = "photo-card space-y-3";
                    div.innerHTML = `
                        <img src="${p.img}" class="w-full h-auto rounded-xl">
                        <div class="flex gap-2">
                            <button onclick="downloadImg('${p.img}')" class="flex-1 bg-blue-500 py-2 rounded-lg font-bold text-sm">기기 저장</button>
                            <button onclick="deleteImg(${p.id})" class="bg-gray-600 px-3 py-2 rounded-lg font-bold text-sm">삭제</button>
                        </div>
                    `;
                    grid.appendChild(div);
                });
            } else {
                grid.innerHTML = '<p class="col-span-full text-center text-slate-500 py-32 text-3xl italic font-bold">아직 등록된 사진이 없습니다.</p>';
            }
        }

        function downloadImg(data) {
            const a = document.createElement('a');
            a.href = data;
            a.download = `spotlight_${Date.now()}.jpg`;
            a.click();
        }

        function deleteImg(id) {
            let photos = JSON.parse(localStorage.getItem('my_spotlight_photos') || '[]');
            photos = photos.filter(p => p.id !== id);
            localStorage.setItem('my_spotlight_photos', JSON.stringify(photos));
            showGallery();
        }

        function clearPhotos() {
            if (confirm("모든 사진 기록을 삭제하고 전시관을 비울까요?")) {
                localStorage.removeItem('my_spotlight_photos');
                showGallery();
            }
        }

        document.getElementById('btn-start').onclick = startCamera;
        document.getElementById('btn-gallery').onclick = showGallery;
        document.getElementById('saveBtn').onclick = saveToLocalGallery;

    </script>
</body>
</html>
