<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스포트라이트 챌린지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body {
            font-family: 'Jua', sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            width: 100vw;
        }

        #app {
            width: 100%;
            height: 100vh;
            background-color: #1e293b;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .camera-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        /* 거울 모드 반전 */
        .mirror-flip {
            transform: scaleX(-1);
        }

        video, #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-large {
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        .btn-large:active { transform: scale(0.95); }
        
        #countdown-overlay { 
            text-shadow: 0 0 60px rgba(239, 68, 68, 0.9);
            font-size: clamp(10rem, 35vw, 25rem);
            z-index: 30;
        }

        .ui-panel {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 50;
            display: flex;
            gap: 1rem;
        }

        .ui-btn {
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        /* 갤러리 카드 */
        .photo-card {
            background: #334155;
            padding: 10px;
            border-radius: 1.5rem;
            border: 3px solid #475569;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .custom-scroll::-webkit-scrollbar { width: 12px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }
        .flash-active { animation: flash-anim 0.5s ease-out; }
        @keyframes flash-anim { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* 미리보기 캔버스 감싸는 틀 고정 */
        .result-container {
            width: 85%;
            height: 60vh;
            border: 12px solid white;
            border-radius: 2.5rem;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #resultCanvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="app">
        <div id="step-start" class="flex-1 flex flex-col items-center justify-center p-10 text-center space-y-10 z-10 bg-slate-900">
            <div class="space-y-4">
                <div class="text-[10rem] md:text-[12rem] leading-none animate-bounce">📸</div>
                <h1 class="text-7xl md:text-[10rem] font-extrabold text-red-500 tracking-tighter uppercase leading-tight">Spotlight</h1>
                <h2 class="text-3xl md:text-5xl text-slate-300 font-bold">원 안에 들어가서 사진을 남겨 보세요!</h2>
            </div>
            
            <div class="flex flex-col md:flex-row gap-8 justify-center pt-6 w-full max-w-4xl px-4">
                <button id="btn-start" class="btn-large flex-1 bg-red-500 hover:bg-red-600 text-white text-4xl md:text-5xl py-8 rounded-[2.5rem] shadow-2xl font-bold border-b-8 border-red-800">
                    챌린지 시작
                </button>
                <button id="btn-gallery" class="btn-large flex-1 bg-blue-600 hover:bg-blue-700 text-white text-4xl md:text-5xl py-8 rounded-[2.5rem] shadow-2xl font-bold border-b-8 border-blue-800">
                    전시관 보기
                </button>
            </div>
            
            <button onclick="toggleFullscreen()" class="bg-slate-700 hover:bg-slate-600 text-white text-xl px-12 py-4 rounded-full border-2 border-slate-500 transition-all shadow-lg">
                🖥️ 전체 화면으로 전환
            </button>
        </div>

        <div id="step-game" class="hidden h-full w-full">
            <div class="ui-panel">
                <button class="ui-btn" onclick="exitToHome()">종료 ✖</button>
            </div>
            <div class="camera-view" id="camera-container">
                <video id="video" autoplay playsinline muted class="mirror-flip"></video>
                <canvas id="gameCanvas" class="mirror-flip"></canvas>
                <div id="countdown-overlay" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <span id="countdown" class="font-black italic"></span>
                </div>
            </div>
        </div>

        <div id="step-result" class="hidden flex-1 flex flex-col items-center justify-center p-8 text-center space-y-6 z-10 bg-slate-900">
            <div class="space-y-2">
                <h2 class="text-4xl md:text-5xl font-bold text-yellow-400">나이스 샷! ✨</h2>
                <p class="text-xl text-slate-300">이 사진을 클라우드 전시관에 등록할까요?</p>
            </div>
            <div class="result-container shadow-2xl">
                <canvas id="resultCanvas"></canvas>
            </div>
            <div class="flex gap-8 justify-center pt-2 w-full max-w-3xl">
                <button onclick="startCamera()" class="flex-1 bg-slate-600 hover:bg-slate-500 text-white py-6 rounded-2xl text-2xl md:text-3xl font-bold btn-large">다시 찍기</button>
                <button id="saveBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-6 rounded-2xl text-2xl md:text-3xl font-bold shadow-xl border-b-8 border-green-900">전시관 등록</button>
            </div>
        </div>

        <div id="step-gallery" class="hidden h-full flex flex-col p-8 space-y-6 z-10 bg-slate-900">
            <div class="flex justify-between items-center border-b-6 border-slate-700 pb-6">
                <h2 class="text-5xl font-bold text-blue-400">🖼️ 실시간 클라우드 전시관</h2>
                <button onclick="exitToHome()" class="bg-red-500 hover:bg-red-600 text-white text-2xl px-10 py-3 rounded-xl font-bold btn-large shadow-lg">메인으로</button>
            </div>
            <div id="gallery-grid" class="flex-1 grid grid-cols-2 lg:grid-cols-3 gap-8 overflow-y-auto p-4 custom-scroll">
                <p id="gallery-loading" class="col-span-full text-center text-slate-500 py-32 text-3xl italic">사진을 불러오는 중...</p>
            </div>
            <div class="text-center pb-6">
                <button onclick="startCamera()" class="bg-red-500 text-white px-16 py-6 rounded-full text-4xl font-bold shadow-2xl btn-large border-b-8 border-red-900">새 사진 찍기</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase 설정 ---
        const manualConfig = {
            apiKey: "AIzaSyC2k6y4zZVwKlM8tpBfxwQBAscHGk3LKPA",
            authDomain: "spotlight-challange.firebaseapp.com",
            projectId: "spotlight-challange",
            storageBucket: "spotlight-challange.firebasestorage.app",
            messagingSenderId: "61626863190",
            appId: "1:61626863190:web:649d47c2f0f8703252b5f7",
            measurementId: "G-41BQH3H7MG"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : manualConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'school-spotlight';

        let user = null;
        let galleryUnsubscribe = null;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (e) { console.error("Firebase 인증 실패:", e); }
        };
        initAuth();
        onAuthStateChanged(auth, (u) => { user = u; });

        // --- 사운드 엔진 ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'tick') { osc.frequency.setValueAtTime(440, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'final') { osc.frequency.setValueAtTime(880, audioCtx.currentTime); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
            else if (type === 'shutter') { playShutterSound(); }
        }
        function playShutterSound() {
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const src = audioCtx.createBufferSource(); src.buffer = buffer;
            const sg = audioCtx.createGain(); sg.gain.setValueAtTime(0.3, audioCtx.currentTime); sg.connect(audioCtx.destination); src.connect(sg); src.start();
        }

        let suspenseInterval;
        function startSuspenseMusic() { stopSuspenseMusic(); suspenseInterval = setInterval(() => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.frequency.setValueAtTime(60, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.4); }, 600); }
        function stopSuspenseMusic() { if (suspenseInterval) clearInterval(suspenseInterval); }

        // --- 메인 로직 ---
        const video = document.getElementById('video');
        const gameCanvas = document.getElementById('gameCanvas');
        const resultCanvas = document.getElementById('resultCanvas');
        const gCtx = gameCanvas.getContext('2d');
        const rCtx = resultCanvas.getContext('2d');
        
        // 원의 크기와 속도를 화면 크기에 맞춰 시원하게 조정
        let spotlight = { x: 0, y: 0, baseR: 200, r: 200, dx: 15, dy: 15, phase: 0 };
        let animationId, countdownValue = 5, isCaptured = false;

        window.switchStep = (stepId) => { ['step-start', 'step-game', 'step-result', 'step-gallery'].forEach(id => document.getElementById(id).classList.add('hidden')); document.getElementById(stepId).classList.remove('hidden'); };
        window.toggleFullscreen = () => { const doc = document.documentElement; if (!document.fullscreenElement) { if (doc.requestFullscreen) doc.requestFullscreen(); } else { document.exitFullscreen(); } };

        function syncCanvasSize() {
            const dpr = window.devicePixelRatio || 1;
            gameCanvas.width = window.innerWidth * dpr;
            gameCanvas.height = window.innerHeight * dpr;
            gCtx.scale(dpr, dpr); 
            
            if (spotlight.x === 0 || spotlight.x > window.innerWidth) spotlight.x = window.innerWidth / 2;
            if (spotlight.y === 0 || spotlight.y > window.innerHeight) spotlight.y = window.innerHeight / 2;
            
            // 원의 크기를 화면의 1/2.5 정도로 크게 키움
            spotlight.baseR = Math.min(window.innerWidth, window.innerHeight) / 2.5;

            // 해상도에 비례한 이동 속도 설정 (시원한 이동 보장)
            const speedBase = Math.min(window.innerWidth, window.innerHeight) * 0.015;
            spotlight.dx = Math.max(12, speedBase) * (spotlight.dx > 0 ? 1 : -1);
            spotlight.dy = Math.max(12, speedBase) * (spotlight.dy > 0 ? 1 : -1);
        }

        window.addEventListener('resize', syncCanvasSize);

        window.exitToHome = () => { isCaptured = true; stopSuspenseMusic(); cancelAnimationFrame(animationId); if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; } if (galleryUnsubscribe) galleryUnsubscribe(); window.switchStep('step-start'); };

        window.startCamera = async () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            try {
                isCaptured = false; countdownValue = 5;
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: "user" }, audio: false });
                video.srcObject = stream;
                window.switchStep('step-game');
                video.onloadedmetadata = () => { video.play(); syncCanvasSize(); startGameLoop(); startCountdown(); startSuspenseMusic(); };
            } catch (err) { alert("카메라 권한을 확인해 주세요!"); }
        };

        function startGameLoop() {
            if (isCaptured) return;
            const w = window.innerWidth;
            const h = window.innerHeight;

            spotlight.x += spotlight.dx; 
            spotlight.y += spotlight.dy;

            // 부드럽게 튕기는 물리 로직 (벽에 닿으면 즉시 튕겨나옴, 불규칙한 흔들림 제거)
            if (spotlight.x - spotlight.r < 0) { spotlight.x = spotlight.r; spotlight.dx = Math.abs(spotlight.dx); }
            if (spotlight.x + spotlight.r > w) { spotlight.x = w - spotlight.r; spotlight.dx = -Math.abs(spotlight.dx); }
            if (spotlight.y - spotlight.r < 0) { spotlight.y = spotlight.r; spotlight.dy = Math.abs(spotlight.dy); }
            if (spotlight.y + spotlight.r > h) { spotlight.y = h - spotlight.r; spotlight.dy = -Math.abs(spotlight.dy); }

            spotlight.phase += 0.05; 
            spotlight.r = spotlight.baseR + Math.sin(spotlight.phase) * (spotlight.baseR * 0.15); // 숨쉬는 효과를 약간 줄여서 안정감 부여
            
            gCtx.clearRect(0, 0, w, h);
            gCtx.fillStyle = "rgba(0, 0, 0, 0.95)"; gCtx.fillRect(0, 0, w, h);
            gCtx.globalCompositeOperation = 'destination-out'; gCtx.beginPath(); gCtx.arc(spotlight.x, spotlight.y, spotlight.r, 0, Math.PI * 2); gCtx.fill();
            gCtx.globalCompositeOperation = 'source-over'; gCtx.strokeStyle = "white"; gCtx.lineWidth = 12; gCtx.beginPath(); gCtx.arc(spotlight.x, spotlight.y, spotlight.r, 0, Math.PI * 2); gCtx.stroke();
            animationId = requestAnimationFrame(startGameLoop);
        }

        function startCountdown() {
            const cdDisplay = document.getElementById('countdown');
            cdDisplay.innerText = countdownValue;
            playSound('tick');
            const timer = setInterval(() => {
                if (isCaptured) { clearInterval(timer); return; }
                countdownValue--;
                if (countdownValue > 0) { cdDisplay.innerText = countdownValue; playSound('tick'); }
                else { clearInterval(timer); cdDisplay.innerText = "📸"; playSound('final'); setTimeout(capturePhoto, 400); }
            }, 1000);
        }

        function capturePhoto() {
            if (isCaptured) return; isCaptured = true; stopSuspenseMusic(); cancelAnimationFrame(animationId);
            playSound('shutter');
            const flash = document.getElementById('flash'); flash.classList.add('flash-active');
            setTimeout(() => flash.classList.remove('flash-active'), 500);

            const w = window.innerWidth;
            const h = window.innerHeight;
            
            // 캡처용 캔버스 크기 고정
            resultCanvas.width = w; 
            resultCanvas.height = h;

            const videoRatio = video.videoWidth / video.videoHeight;
            const screenRatio = w / h;
            let drawW, drawH, drawX, drawY;

            if (screenRatio > videoRatio) {
                drawW = resultCanvas.width; drawH = resultCanvas.width / videoRatio; drawX = 0; drawY = (resultCanvas.height - drawH) / 2;
            } else {
                drawH = resultCanvas.height; drawW = resultCanvas.height * videoRatio; drawX = (resultCanvas.width - drawW) / 2; drawY = 0;
            }

            rCtx.save(); 
            rCtx.translate(resultCanvas.width, 0); 
            rCtx.scale(-1, 1); 
            rCtx.drawImage(video, drawX, drawY, drawW, drawH); 
            rCtx.restore();
            
            const mask = document.createElement('canvas'); 
            mask.width = resultCanvas.width; mask.height = resultCanvas.height;
            const mCtx = mask.getContext('2d');
            mCtx.fillStyle = "rgba(0,0,0,0.95)"; mCtx.fillRect(0, 0, mask.width, mask.height);
            mCtx.globalCompositeOperation = 'destination-out'; mCtx.beginPath(); 
            mCtx.arc(w - spotlight.x, spotlight.y, spotlight.r, 0, Math.PI * 2); 
            mCtx.fill();
            rCtx.drawImage(mask, 0, 0);

            gCtx.clearRect(0, 0, w, h);
            gCtx.save(); gCtx.translate(w, 0); gCtx.scale(-1, 1); 
            gCtx.drawImage(resultCanvas, 0, 0, w, h); gCtx.restore();

            setTimeout(() => { switchStep('step-result'); }, 1000);
        }

        window.uploadToFirebase = async () => {
            if (!user) { alert("로그인 중입니다. 잠시만 기다려주세요."); return; }
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "전송 중...";
            try {
                // 1MB 용량 초과 방지를 위한 이미지 사이즈 최적화 로직 추가
                const tempCanvas = document.createElement('canvas');
                let uploadW = resultCanvas.width;
                let uploadH = resultCanvas.height;
                const MAX_WIDTH = 1280; // 최대 가로 픽셀을 1280으로 강제 제한하여 용량 확보
                
                if (uploadW > MAX_WIDTH) {
                    uploadH = Math.floor(uploadH * (MAX_WIDTH / uploadW));
                    uploadW = MAX_WIDTH;
                }
                
                tempCanvas.width = uploadW;
                tempCanvas.height = uploadH;
                tempCanvas.getContext('2d').drawImage(resultCanvas, 0, 0, uploadW, uploadH);
                
                // 압축 적용 (0.6 품질)
                const optimizedImageData = tempCanvas.toDataURL('image/jpeg', 0.6);

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'photos'), {
                    image: optimizedImageData,
                    createdAt: serverTimestamp(),
                    userId: user.uid
                });
                window.showGallery();
            } catch (e) { 
                alert("전송 실패: " + e.message + "\n(데이터베이스 권한 규칙이나 용량 초과일 수 있습니다.)"); 
                btn.disabled = false; btn.innerText = "전시관 등록"; 
            }
        };

        window.showGallery = () => {
            if (!user) return;
            window.switchStep('step-gallery');
            const grid = document.getElementById('gallery-grid');
            if (galleryUnsubscribe) galleryUnsubscribe();
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
            galleryUnsubscribe = onSnapshot(q, (snapshot) => {
                const photos = [];
                snapshot.forEach(doc => photos.push({ id: doc.id, ...doc.data() }));
                photos.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                grid.innerHTML = '';
                if (photos.length > 0) {
                    photos.forEach(p => {
                        const div = document.createElement('div');
                        div.className = "photo-card flex flex-col gap-2";
                        div.innerHTML = `
                            <img src="${p.image}" class="w-full h-auto rounded-xl">
                            <div class="flex gap-2">
                                <button onclick="window.downloadOne('${p.image}')" class="flex-1 bg-blue-500 py-2 rounded-lg font-bold text-sm">저장</button>
                                <button onclick="window.deletePhoto('${p.id}')" class="bg-gray-600 px-3 py-2 rounded-lg font-bold text-sm">삭제</button>
                            </div>
                        `;
                        grid.appendChild(div);
                    });
                } else { grid.innerHTML = '<p class="col-span-full text-center py-32 text-2xl italic">사진이 없습니다.</p>'; }
            }, (error) => {
                console.error("Firestore 로드 오류: ", error);
            });
        };

        window.downloadOne = (data) => { const link = document.createElement('a'); link.href = data; link.download = `spotlight_${Date.now()}.jpg`; link.click(); };
        window.deletePhoto = async (id) => { if (confirm("삭제할까요?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'photos', id)); };

        document.getElementById('btn-start').onclick = startCamera;
        document.getElementById('btn-gallery').onclick = showGallery;
        document.getElementById('saveBtn').onclick = uploadToFirebase;
    </script>
</body>
</html>
